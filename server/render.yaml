services:
  - type: web
    name: expense-api
    runtime: docker
    plan: free
    rootDir: server
    dockerfilePath: ./Dockerfile
    # Render doesn't auto-inject the commit SHA into Docker builds. We pull
    # it from RENDER_GIT_COMMIT (the env var Render sets for the deployed
    # revision) and pass it to the Dockerfile as a build arg.
    dockerContext: .
    buildCommand: ""
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: expenses
      - key: ALLOWED_ORIGIN
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: AUTH_JWT_SECRET
        sync: false