services:
  - type: web
    name: expense-api
    runtime: docker
    plan: free
    rootDir: server
    dockerfilePath: ./Dockerfile
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: expenses
      - key: ALLOWED_ORIGIN
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: AUTH_JWT_SECRET
        sync: false